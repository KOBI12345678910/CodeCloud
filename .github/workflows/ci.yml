name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: 24
  PNPM_VERSION: 9

jobs:
  zero-tests-guard:
    name: Fail if any package has zero tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find packages with zero test files
        run: |
          set -e
          missing=0
          # Enforce across every workspace package (lib/* and artifacts/*) that
          # exposes a "test" script in package.json.
          while IFS= read -r pkgjson; do
            pkg=$(dirname "$pkgjson")
            if grep -q '"test"' "$pkgjson"; then
              count=$(find "$pkg" -type f \
                \( -name "*.test.ts" -o -name "*.test.tsx" \
                   -o -name "*.spec.ts" -o -name "*.spec.tsx" \
                   -o -name "*.test.js"  -o -name "*.spec.js" \) \
                -not -path "*/node_modules/*" -not -path "*/dist/*" | wc -l)
              if [ "$count" -eq 0 ]; then
                echo "::error::Package $pkg has a \"test\" script but zero test files"
                missing=$((missing + 1))
              fi
            fi
          done < <(find lib artifacts -mindepth 2 -maxdepth 4 -name package.json -not -path "*/node_modules/*")
          if [ "$missing" -gt 0 ]; then exit 1; fi

  build-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify pnpm dev orchestrates only canonical services
        run: pnpm dev:graph:check
      - run: pnpm build

  a11y:
    name: WCAG axe-core checks on shell
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }}, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Run axe-core against rendered platform shell
        run: pnpm --filter @platform/ui test

  rls-isolation:
    name: RLS tenant-isolation integration (real Postgres)
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }}, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Run RLS isolation test against real Postgres
        env:
          INTEGRATION_DATABASE_URL: postgres://platform:platform@localhost:5432/platform
        run: pnpm --filter @platform/db test

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build-test
    # Build container images for every deployable on every PR so we
    # catch Dockerfile / pnpm-workspace breakage before merge. Pushing
    # to GHCR stays gated to main-branch builds so PRs from forks don't
    # need write access to the registry.
    strategy:
      fail-fast: false
      matrix:
        app: [cloud-ide, api-trpc, api-server, worker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main) ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/${{ matrix.app }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
