openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: |
    CodeCloud API. Primary authentication uses Clerk (session cookies managed
    by @clerk/express middleware). The /auth/* JWT endpoints are an optional
    secondary auth layer for programmatic API clients that cannot use Clerk
    sessions.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: files
    description: File operations
  - name: templates
    description: Project templates
  - name: dashboard
    description: Dashboard & stats
  - name: explore
    description: Public project exploration
  - name: collaborators
    description: Project collaborators
  - name: deployments
    description: Project deployments
  - name: profile
    description: User profile
  - name: auth
    description: Authentication (JWT)
  - name: settings
    description: User settings & API keys
  - name: feedback
    description: User feedback

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List current user's projects
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, name, updated]
            default: recent
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Project deleted

  /projects/{id}/fork:
    post:
      operationId: forkProject
      tags: [projects]
      summary: Fork a public project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Forked project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}/files:
    get:
      operationId: listFiles
      tags: [files]
      summary: Get file tree for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileNode"
    post:
      operationId: createFile
      tags: [files]
      summary: Create a file or folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFileBody"
      responses:
        "201":
          description: Created file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNode"

  /projects/{projectId}/files/{fileId}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get file content
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNode"
    patch:
      operationId: updateFile
      tags: [files]
      summary: Update file content or name
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFileBody"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNode"
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file or folder
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: File deleted

  /projects/{projectId}/files/{fileId}/move:
    patch:
      operationId: moveFile
      tags: [files]
      summary: Move a file to a new path
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveFileBody"
      responses:
        "200":
          description: Moved file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNode"

  /projects/{id}/collaborators:
    get:
      operationId: listCollaborators
      tags: [collaborators]
      summary: List project collaborators
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collaborators list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collaborator"
    post:
      operationId: addCollaborator
      tags: [collaborators]
      summary: Add collaborator to project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCollaboratorBody"
      responses:
        "201":
          description: Added collaborator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"

  /projects/{projectId}/collaborators/{userId}:
    delete:
      operationId: removeCollaborator
      tags: [collaborators]
      summary: Remove collaborator
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Collaborator removed

  /projects/{id}/deployments:
    get:
      operationId: listDeployments
      tags: [deployments]
      summary: List project deployments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
    post:
      operationId: createDeployment
      tags: [deployments]
      summary: Deploy a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /projects/{id}/deployments/{deploymentId}:
    get:
      operationId: getDeploymentStatus
      tags: [deployments]
      summary: Get deployment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          description: Deployment not found

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List available project templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /explore:
    get:
      operationId: exploreProjects
      tags: [explore]
      summary: Browse public projects
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [trending, recent, forked]
            default: recent
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Public projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent project activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/language-breakdown:
    get:
      operationId: getLanguageBreakdown
      tags: [dashboard]
      summary: Get project language breakdown
      responses:
        "200":
          description: Language breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LanguageCount"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke tokens
      responses:
        "200":
          description: Logged out

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
              required:
                - currentPassword
                - newPassword
      responses:
        "200":
          description: Password changed

  /settings/api-keys:
    get:
      operationId: listApiKeys
      tags: [settings]
      summary: List user API keys
      responses:
        "200":
          description: API keys list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: createApiKey
      tags: [settings]
      summary: Create an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"

  /settings/api-keys/{keyId}:
    delete:
      operationId: deleteApiKey
      tags: [settings]
      summary: Delete an API key
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: API key deleted

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackBody"
      responses:
        "201":
          description: Feedback submitted
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List feedback (admin only)
      responses:
        "200":
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackItem"

components:
  schemas:
    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        username:
          type: string
          minLength: 3
          maxLength: 30
      required:
        - email
        - password
        - username

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          type: object
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
        scopes:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - keyPrefix
        - createdAt

    FeedbackBody:
      type: object
      properties:
        type:
          type: string
          enum: [bug, feature, improvement]
        description:
          type: string
          minLength: 10
        severity:
          type: string
          enum: [low, medium, high, critical]
        email:
          type: string
          format: email
        projectId:
          type: string
          format: uuid
      required:
        - type
        - description

    FeedbackItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        description:
          type: string
        severity:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        projectId:
          type: string
          format: uuid
          nullable: true
        userId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - description
        - status
        - createdAt

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      properties:
        id:
          type: string
        clerkId:
          type: string
        email:
          type: string
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        plan:
          type: string
          enum: [free, pro, team]
        storageUsedBytes:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - email
        - username
        - plan
        - storageUsedBytes
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        username:
          type: string
        avatarUrl:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        language:
          type: string
        isPublic:
          type: boolean
        forkedFromId:
          type: ["string", "null"]
        runCommand:
          type: ["string", "null"]
        entryFile:
          type: string
        containerStatus:
          type: string
          enum: [stopped, starting, running, error]
        deployedUrl:
          type: ["string", "null"]
        lastAccessedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        ownerName:
          type: ["string", "null"]
      required:
        - id
        - ownerId
        - name
        - slug
        - language
        - isPublic
        - entryFile
        - containerStatus
        - createdAt
        - updatedAt

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
      required:
        - projects
        - total

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        language:
          type: string
        templateId:
          type: string
        isPublic:
          type: boolean
          default: true
      required:
        - name
        - language

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        isPublic:
          type: boolean
        runCommand:
          type: string
        entryFile:
          type: string

    FileNode:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        path:
          type: string
        name:
          type: string
        isDirectory:
          type: boolean
        content:
          type: ["string", "null"]
        sizeBytes:
          type: integer
        mimeType:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - path
        - name
        - isDirectory
        - sizeBytes
        - createdAt
        - updatedAt

    CreateFileBody:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        isDirectory:
          type: boolean
          default: false
        content:
          type: string
      required:
        - path
        - name

    UpdateFileBody:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        path:
          type: string

    MoveFileBody:
      type: object
      properties:
        newPath:
          type: string
      required:
        - newPath

    Collaborator:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        userId:
          type: string
        role:
          type: string
          enum: [viewer, editor, admin]
        username:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - userId
        - role
        - createdAt

    AddCollaboratorBody:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
          enum: [viewer, editor, admin]
          default: editor
      required:
        - username

    Deployment:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        deployedBy:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [building, deploying, live, failed, stopped]
        subdomain:
          type: ["string", "null"]
        buildLog:
          type: ["string", "null"]
        errorLog:
          type: ["string", "null"]
        port:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        stoppedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - projectId
        - deployedBy
        - version
        - status
        - createdAt

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        language:
          type: string
        iconUrl:
          type: ["string", "null"]
        runCommand:
          type: string
        entryFile:
          type: string
        dockerImage:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - name
        - slug
        - language
        - runCommand
        - entryFile
        - dockerImage
        - isActive
        - sortOrder

    DashboardStats:
      type: object
      properties:
        totalProjects:
          type: integer
        totalDeployments:
          type: integer
        storageUsedBytes:
          type: integer
        activeContainers:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - totalProjects
        - totalDeployments
        - storageUsedBytes
        - activeContainers
        - recentProjects

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [project_created, file_updated, deployment_created, collaborator_added]
        projectId:
          type: string
        projectName:
          type: string
        description:
          type: string
        createdAt:
